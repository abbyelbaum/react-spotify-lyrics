# Netlify deploy config.
#
# The frontend is built from frontend/ and published to frontend/dist.
# /api/* and /auth/* are proxied to the Render backend so the browser sees
# a single origin (no CORS, simple cookies — same trick as Vite in dev).
# All other paths fall through to /index.html so client-side routing works
# on refresh.
#
# The backend URL is hardcoded below. If you rename the Render service or
# move to a different host, update both `to` values.

[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"   # relative to `base`, so this resolves to frontend/dist

# Proxy backend routes. `status = 200` makes these rewrites (transparent
# server-side proxy), not redirects, so the URL stays on the Netlify domain.
[[redirects]]
  from   = "/api/*"
  to     = "https://react-spotify-lyrics-backend.onrender.com/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/auth/*"
  to     = "https://react-spotify-lyrics-backend.onrender.com/auth/:splat"
  status = 200
  force  = true

# SPA fallback: every other path serves the React app's index.html so
# routes like /quiz and /scores work on direct navigation / refresh.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
